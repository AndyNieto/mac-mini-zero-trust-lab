# A Lima configuration for a K3s worker node using NAT
images:
- location: "https://cloud-images.ubuntu.com/releases/22.04/release/ubuntu-22.04-server-cloudimg-arm64.img"
  arch: "aarch64"
cpus: 2
memory: "4GiB"
disk: "30GiB"
mounts:
- location: "~"
  writable: false
- location: "/tmp/lima"
  writable: true
containerd:
  system: true
  user: false
