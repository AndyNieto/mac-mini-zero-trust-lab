# DVWA (Damn Vulnerable Web Application)
# An intentionally vulnerable PHP/MySQL web application covering OWASP Top 10.
# Default login after setup: admin / password
#
# FIRST-TIME SETUP: After deployment, visit http://localhost:30880/setup.php
# and click "Create / Reset Database" to initialize the DB schema.

---
# MariaDB backend for DVWA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dvwa-mariadb
  namespace: vuln-lab
  labels:
    app: dvwa-mariadb
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dvwa-mariadb
  template:
    metadata:
      labels:
        app: dvwa-mariadb
        component: database
    spec:
      nodeSelector:
        kubernetes.io/hostname: lima-k3s-master
      containers:
      - name: mariadb
        image: mariadb:11
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "rootpassword"
        - name: MYSQL_DATABASE
          value: "dvwa"
        - name: MYSQL_USER
          value: "dvwa"
        - name: MYSQL_PASSWORD
          value: "dvwa"
        ports:
        - containerPort: 3306
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 500m

---
apiVersion: v1
kind: Service
metadata:
  name: dvwa-mariadb
  namespace: vuln-lab
spec:
  selector:
    app: dvwa-mariadb
  ports:
  - port: 3306
    targetPort: 3306

---
# DVWA application
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dvwa
  namespace: vuln-lab
  labels:
    app: dvwa
    component: target
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dvwa
  template:
    metadata:
      labels:
        app: dvwa
        component: target
    spec:
      nodeSelector:
        kubernetes.io/hostname: lima-k3s-master
      containers:
      - name: dvwa
        image: ghcr.io/digininja/dvwa:latest
        env:
        - name: DB_SERVER
          value: "dvwa-mariadb"
        - name: DB_DATABASE
          value: "dvwa"
        - name: DB_USER
          value: "dvwa"
        - name: DB_PASSWORD
          value: "dvwa"
        - name: RECAPTCHA_PRIV_KEY
          value: ""
        - name: RECAPTCHA_PUB_KEY
          value: ""
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: 128Mi
            cpu: 100m
          limits:
            memory: 256Mi
            cpu: 500m

---
apiVersion: v1
kind: Service
metadata:
  name: dvwa
  namespace: vuln-lab
spec:
  type: NodePort
  selector:
    app: dvwa
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30880
