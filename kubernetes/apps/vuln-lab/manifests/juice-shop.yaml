# OWASP Juice Shop
# A modern intentionally insecure Node.js web application.
# Covers all OWASP Top 10 and more, with a built-in scoreboard
# that tracks which vulnerabilities you've found.
#
# Access: http://localhost:30881 (via SSH tunnel)
# No setup required — starts immediately.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: juice-shop
  namespace: vuln-lab
  labels:
    app: juice-shop
    component: target
spec:
  replicas: 1
  selector:
    matchLabels:
      app: juice-shop
  template:
    metadata:
      labels:
        app: juice-shop
        component: target
    spec:
      nodeSelector:
        kubernetes.io/hostname: lima-k3s-master
      containers:
      - name: juice-shop
        image: bkimminich/juice-shop:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 500m

---
apiVersion: v1
kind: Service
metadata:
  name: juice-shop
  namespace: vuln-lab
spec:
  type: NodePort
  selector:
    app: juice-shop
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30881