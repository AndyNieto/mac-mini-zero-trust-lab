# Prometheus Stack Values for K3s Home Lab
# Chart: prometheus-community/kube-prometheus-stack

# Force pods to master node for debugging (worker node has log access issues)
# Remove this section once networking is fixed
commonLabels:
  environment: homelab

# Grafana configuration
grafana:
  enabled: true
  adminPassword: "homelab-admin"
  nodeSelector:
    kubernetes.io/hostname: lima-k3s-master
  service:
    type: NodePort
    nodePort: 30300
  persistence:
    enabled: true
    size: 5Gi
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

# Prometheus configuration
prometheus:
  prometheusSpec:
    nodeSelector:
      kubernetes.io/hostname: lima-k3s-master
    retention: 15d
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 2Gi
        cpu: 1000m
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
  service:
    type: NodePort
    nodePort: 30090

# Alertmanager configuration
alertmanager:
  alertmanagerSpec:
    nodeSelector:
      kubernetes.io/hostname: lima-k3s-master
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 256Mi
        cpu: 200m
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
  service:
    type: NodePort
    nodePort: 30093

# Node exporter for host metrics
nodeExporter:
  enabled: true

# Kube-state-metrics for Kubernetes object metrics
kube-state-metrics:
  nodeSelector:
    kubernetes.io/hostname: lima-k3s-master

# Reduce resource usage for home lab
prometheusOperator:
  nodeSelector:
    kubernetes.io/hostname: lima-k3s-master
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m
  # Disable admission webhooks and TLS for simpler home lab setup
  admissionWebhooks:
    enabled: false
    patch:
      enabled: false
  tls:
    enabled: false

# K3s specific configurations
# K3s bundles control plane components differently than standard K8s
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false
