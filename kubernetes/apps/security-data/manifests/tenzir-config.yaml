apiVersion: v1
kind: ConfigMap
metadata:
  name: tenzir-config
  namespace: security-data
data:
  tenzir.yaml: |
    # Tenzir Node Configuration for K3s Home Lab

    # Node settings
    tenzir:
      # Enable web interface
      web:
        bind: "0.0.0.0"
        port: 5160

      # API settings
      endpoint: "0.0.0.0:5158"

      # Storage settings
      state-directory: /var/lib/tenzir

      # Logging
      console-verbosity: info
      file-verbosity: debug
